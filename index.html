<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALPAD — AI Legal Product Analysis Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-box">
      <div class="gate-brand">ALPAD</div>
      <div class="gate-sub">AI Legal Product Analysis Dashboard</div>
      <form class="gate-form" id="gateForm">
        <input class="gate-input" id="gateInput" type="password" placeholder="Password" autocomplete="current-password" autofocus>
        <div class="gate-error" id="gateError"></div>
        <button class="gate-btn" type="submit">Enter</button>
      </form>
    </div>
  </div>

  <header class="header" id="appHeader" style="display:none">
    <span class="header-brand">ALPAD</span>
    <span class="header-sep"></span>
    <span class="header-sub">AI Legal Product Analysis Dashboard</span>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </header>

  <div class="app-layout" id="appLayout" style="display:none">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="main-content"></main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
